<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Review</title>
    <meta name="author" content="Lwazi Lubisi">
    <meta name="description" content="This page will be reviewing a product and rating the product according to the the way it med the users' needs.">
    <link rel="stylesheet" href="styles/form.css">
    <script src="scripts/form.js" defer></script>
</head>

<body>
    <header>
        <h1>Product Review</h1>
    </header>
    <form method="get" action="review.html">

        <!-- Product Name -->
        <label for="product">Product Name:</label>
        <select id="product" name="product" required>
            <option value="" disabled selected>Select a Product ...</option>
        </select>

        <!-- Rating -->       
        <legend>Overall Rating:</legend>
        <label for="rating"><input type="radio" id="rating" name="rating" value="1" required> ☆</label>
        <label for="rating"><input type="radio" id="rating" name="rating" value="2" required> ☆☆</label>
        <label for="rating"><input type="radio" id="rating" name="rating" value="3" required> ☆☆☆</label>
        <label for="ratring"><input type="radio" id="rating" name="rating" value="4" required> ☆☆☆☆</label>
        <label for="Rating"><input type="radio" id="rating" name="rating" value="5" required> ☆☆☆☆☆</label>

        <!-- Date -->
        <label for="date">Date of Installation:</label>
        <input type="date" id="date" name="date" required>

        <!-- Features -->
        <legend>Useful Features:</legend>
        <label for="features"><input type="checkbox" id="features" name="features" value="Durability"> Durability</label>
        <label for="features"><input type="checkbox" id="features" name="features" value="Design"> Design</label>
        <label for="features"><input type="checkbox" id="features" name="features" value="Performance"> Performance</label>
        <label for="features"><input type="checkbox" id="features" name="features" value="Value"> Value</label>
        

        <!-- Review -->
        <label for="review">Written Review:</label>
        <textarea id="review" name="review"></textarea>

        <!-- Name -->
        <label for="username">Your Name:</label>
        <input type="text" id="username" name="username">

        <!-- Submit -->
        <input type="submit" value="Submit Review">

    </form>

    <footer>
        <p>© <span id="year"></span> | Lwazi Lubisi</p>
    </footer>

</body>

</html>
